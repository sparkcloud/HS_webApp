<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathway Predictor MVP</title>
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>

    <button id="nav-toggle-btn" class="nav-toggle-btn hidden">☰</button>

    <nav id="main-nav" class="hidden">
        <button id="nav-career-btn">Career Tool</button>
        <button id="nav-profile-btn">User Profile</button>
        <button id="nav-logout-btn" style="color: #ff6b6b;">Log Out</button>
    </nav>

    <main id="auth-container" class="container">
        <h1>Welcome!</h1>
        <p>Please log in or sign up to save your pathways.</p>

        <input type="email" id="email-input" placeholder="Email address" required>
        <input type="password" id="password-input" placeholder="Password" required>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="login-btn">Log In</button>
            <button id="signup-btn" style="background-color: #6c757d;">Sign Up</button>
        </div>

        <p id="auth-message" style="color: red; font-weight: bold; margin-top: 15px;"></p>
    </main>

    <main id="app-container" class="container hidden">
        <h1>Discover Your Pathway</h1>

        <p class="mad-libs-text">
            When I have free time, I most enjoy
            <select id="q1">
                <option value="tech">building things</option>
                <option value="health">helping others</option>
                <option value="arts">creating art</option>
            </select>.
            If I had to solve a problem, I would rather
            <select id="q2">
                <option value="tech">use logic and code</option>
                <option value="health">talk it out with people</option>
                <option value="arts">brainstorm wild ideas</option>
            </select>.
            I feel most successful when I
            <select id="q3">
                <option value="tech">make something work</option>
                <option value="health">make someone smile</option>
                <option value="arts">express myself fully</option>
            </select>.
        </p>

        <button id="predict-btn">Find My Path</button>

        <div id="result-container" class="hidden">
            <h2>Your Best Match:</h2>
            <p id="result-text" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;"></p>

            <canvas id="share-canvas" width="600" height="400" style="display: none;"></canvas>

            <img id="share-image" alt="Your Pathway Card" style="max-width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px;">

            <div class="share-actions" style="display: flex; flex-direction: column; gap: 10px;">
                <button id="download-btn" style="background-color: #28a745;">💾 Download Card for Instagram/TikTok</button>

                <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px;">
                    <button id="share-x-btn" style="background-color: #000; flex: 1;">X (Twitter)</button>
                    <button id="share-linkedin-btn" style="background-color: #0077b5; flex: 1;">LinkedIn</button>
                    <button id="share-instagram-btn" style="background-color: #e4405f; flex: 1;">Instagram</button>
                    <button id="share-tiktok-btn" style="background-color: #000; flex: 1;">TikTok</button>
                    <button id="share-email-btn" style="background-color: #17a2b8; flex: 1;">Email</button>
                </div>

                <button id="copy-link-btn" style="background-color: #6c757d; margin-top: 10px;">📋 Copy Text for Discord/Slack</button>
            </div>
        </div>
    </main>

    <main id="profile-container" class="container hidden">
        <h1>User Profile</h1>
        <p>Welcome to your dashboard. Your past results will appear here.</p>

        <div id="history-list"></div>

        <button id="delete-selected-btn" class="hidden" style="background-color: #dc3545; margin-top: 20px;">Delete Selected</button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/util/app.js"></script>
</body>
</html>
